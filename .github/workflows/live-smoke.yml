name: live-smoke

# Optional gated lane: live smoke test against an operator-configured Azure
# AI Foundry deployment. Skips safely (success with a summary message) when
# the required secret is not configured, so PRs from forks/public
# contributors do not fail.
#
# Operator action required (one-time, out-of-band):
#   1. Configure repo secret `TEST_INTELLIGENCE_LLM_API_KEY` with a
#      non-prod Azure AI Foundry key.
#   2. Configure repo secret `TEST_INTELLIGENCE_MODEL_ENDPOINT` with the
#      base URL (e.g. `https://<resource>.cognitiveservices.azure.com`).
#   3. Configure repo secret `TEST_INTELLIGENCE_VISUAL_MODEL_ENDPOINT`
#      for the visual sidecar deployment endpoint.
#
# Until those secrets are set, the workflow short-circuits with a
# `skipped: secret not configured` job summary instead of failing.
#
# The underlying `pnpm run test:ti-live-smoke` script is a no-op stub in
# this repo (the live-smoke module is not yet ported). The workflow shape
# is established now so operator setup is unblocked; the stub becomes a
# real invocation when the live runtime module lands.

on:
  schedule:
    # 03:30 UTC nightly — outside business hours for both EU and US.
    - cron: "30 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  live-smoke:
    name: ti-live-smoke
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Check for required secret
        id: check_secret
        env:
          API_KEY: ${{ secrets.TEST_INTELLIGENCE_LLM_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "secret_present=false" >> "$GITHUB_OUTPUT"
            {
              echo "## live-smoke skipped"
              echo
              echo "Repo secret \`TEST_INTELLIGENCE_LLM_API_KEY\` is not"
              echo "configured. See \`.github/workflows/live-smoke.yml\` for"
              echo "the operator setup steps."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "secret_present=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: steps.check_secret.outputs.secret_present == 'true'
        with:
          persist-credentials: false

      - name: Enable corepack
        if: steps.check_secret.outputs.secret_present == 'true'
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        if: steps.check_secret.outputs.secret_present == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.check_secret.outputs.secret_present == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run live smoke
        if: steps.check_secret.outputs.secret_present == 'true'
        env:
          TEST_INTELLIGENCE_LLM_API_KEY: ${{ secrets.TEST_INTELLIGENCE_LLM_API_KEY }}
          TEST_INTELLIGENCE_MODEL_ENDPOINT: ${{ secrets.TEST_INTELLIGENCE_MODEL_ENDPOINT }}
          TEST_INTELLIGENCE_VISUAL_MODEL_ENDPOINT: ${{ secrets.TEST_INTELLIGENCE_VISUAL_MODEL_ENDPOINT }}
        run: pnpm run test:ti-live-smoke
