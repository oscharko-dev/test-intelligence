name: test-intelligence-live-e2e

# Optional gated lane: live end-to-end smoke for the production runner against
# the operator-configured Azure AI Foundry deployment. Never triggered on
# `pull_request` (forks cannot read the live API key, and the per-run cost
# ceiling must not be paid on every PR).
#
# The underlying `pnpm run test:ti-live-e2e` script is a no-op stub in this
# repo until the live-E2E runtime is enabled.
#
# Operator action required (one-time, out-of-band):
#   1. Configure repo secret `TEST_INTELLIGENCE_LLM_API_KEY` with a
#      non-prod Azure AI Foundry key.
#   2. Configure repo secret `TEST_INTELLIGENCE_MODEL_ENDPOINT` with the
#      base URL (e.g. `https://<resource>.cognitiveservices.azure.com`).
#   3. Configure repo secret `TEST_INTELLIGENCE_TESTCASE_MODEL_DEPLOYMENT`
#      with the test-generation deployment id.
#   4. Configure repo secret `TEST_INTELLIGENCE_VISUAL_MODEL_ENDPOINT`
#      with the multimodal base URL.
#   5. Configure repo secret `TEST_INTELLIGENCE_VISUAL_PRIMARY_DEPLOYMENT`
#      with the primary visual deployment id.
#   6. Configure repo secret `TEST_INTELLIGENCE_VISUAL_FALLBACK_DEPLOYMENT`
#      with the fallback visual deployment id.

on:
  schedule:
    # 01:00 UTC nightly — clear of the 03:30 UTC `live-smoke.yml` slot to
    # avoid Azure-side rate-limit overlap.
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  live-e2e:
    name: ti-live-e2e
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Check for required secrets
        id: check_secret
        env:
          API_KEY: ${{ secrets.TEST_INTELLIGENCE_LLM_API_KEY }}
          MODEL_ENDPOINT: ${{ secrets.TEST_INTELLIGENCE_MODEL_ENDPOINT }}
          TESTCASE_DEPLOYMENT: ${{ secrets.TEST_INTELLIGENCE_TESTCASE_MODEL_DEPLOYMENT }}
          VISUAL_ENDPOINT: ${{ secrets.TEST_INTELLIGENCE_VISUAL_MODEL_ENDPOINT }}
          VISUAL_PRIMARY: ${{ secrets.TEST_INTELLIGENCE_VISUAL_PRIMARY_DEPLOYMENT }}
          VISUAL_FALLBACK: ${{ secrets.TEST_INTELLIGENCE_VISUAL_FALLBACK_DEPLOYMENT }}
        run: |
          missing=""
          [ -n "$API_KEY" ] || missing="${missing}\n- TEST_INTELLIGENCE_LLM_API_KEY"
          [ -n "$MODEL_ENDPOINT" ] || missing="${missing}\n- TEST_INTELLIGENCE_MODEL_ENDPOINT"
          [ -n "$TESTCASE_DEPLOYMENT" ] || missing="${missing}\n- TEST_INTELLIGENCE_TESTCASE_MODEL_DEPLOYMENT"
          [ -n "$VISUAL_ENDPOINT" ] || missing="${missing}\n- TEST_INTELLIGENCE_VISUAL_MODEL_ENDPOINT"
          [ -n "$VISUAL_PRIMARY" ] || missing="${missing}\n- TEST_INTELLIGENCE_VISUAL_PRIMARY_DEPLOYMENT"
          [ -n "$VISUAL_FALLBACK" ] || missing="${missing}\n- TEST_INTELLIGENCE_VISUAL_FALLBACK_DEPLOYMENT"
          if [ -n "$missing" ]; then
            echo "secret_present=false" >> "$GITHUB_OUTPUT"
            {
              echo "## live-E2E skipped"
              echo
              echo "The live-E2E lane requires the full Azure Foundry secret set."
              echo "Missing secrets:"
              printf '%b\n' "$missing"
              echo
              echo "Enable this workflow only after the live Azure Foundry secret set is configured."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "secret_present=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: steps.check_secret.outputs.secret_present == 'true'
        with:
          persist-credentials: false

      - name: Enable corepack
        if: steps.check_secret.outputs.secret_present == 'true'
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        if: steps.check_secret.outputs.secret_present == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.check_secret.outputs.secret_present == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run production-runner live-E2E
        id: run_live_e2e
        if: steps.check_secret.outputs.secret_present == 'true'
        env:
          TEST_INTELLIGENCE_LLM_API_KEY: ${{ secrets.TEST_INTELLIGENCE_LLM_API_KEY }}
          TEST_INTELLIGENCE_MODEL_ENDPOINT: ${{ secrets.TEST_INTELLIGENCE_MODEL_ENDPOINT }}
          TEST_INTELLIGENCE_TESTCASE_MODEL_DEPLOYMENT: ${{ secrets.TEST_INTELLIGENCE_TESTCASE_MODEL_DEPLOYMENT }}
          TEST_INTELLIGENCE_VISUAL_MODEL_ENDPOINT: ${{ secrets.TEST_INTELLIGENCE_VISUAL_MODEL_ENDPOINT }}
          TEST_INTELLIGENCE_VISUAL_PRIMARY_DEPLOYMENT: ${{ secrets.TEST_INTELLIGENCE_VISUAL_PRIMARY_DEPLOYMENT }}
          TEST_INTELLIGENCE_VISUAL_FALLBACK_DEPLOYMENT: ${{ secrets.TEST_INTELLIGENCE_VISUAL_FALLBACK_DEPLOYMENT }}
        run: pnpm run test:ti-live-e2e

      - name: Upload live-E2E artifacts
        if: always() && steps.check_secret.outputs.secret_present == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ti-live-e2e-rundir-${{ github.run_id }}
          path: |
            artifacts/testing/ti-live-e2e/**
          if-no-files-found: ignore
          retention-days: 14
