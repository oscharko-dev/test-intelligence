name: mutation-nightly

# Optional gated lane: nightly Stryker mutation testing.
#
# The standalone scope (per issue #24, decision §6.2) mutates only
# `src/error-sanitization.ts` and `packages/server/src/request-security.ts` — two
# small, security-critical, deeply tested modules. The Stryker config that
# binds the mutator scope, the test runner, and the score thresholds lives
# at `stryker.config.mjs`.
#
# Gating: this workflow runs only when the `MUTATION_NIGHTLY_ENABLED`
# repository variable is set to `true`. That gives operators a one-touch
# enable/disable without editing the workflow. The first time an operator
# flips the variable, the nightly schedule begins; until then, scheduled
# runs short-circuit cleanly.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mutation:
    name: ti-mutation-nightly
    timeout-minutes: 60
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Check enable flag
        id: check_enable
        env:
          ENABLED: ${{ vars.MUTATION_NIGHTLY_ENABLED }}
        run: |
          if [ "$ENABLED" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "## mutation-nightly skipped"
              echo
              echo "The mutation-nightly lane is disabled."
              echo "Set repository variable \`MUTATION_NIGHTLY_ENABLED=true\` to enable."
              echo
              echo "See \`stryker.config.mjs\` for the mutation lane scope."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: steps.check_enable.outputs.enabled == 'true'
        with:
          persist-credentials: false

      - name: Enable corepack
        if: steps.check_enable.outputs.enabled == 'true'
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        if: steps.check_enable.outputs.enabled == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.check_enable.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run mutation
        if: steps.check_enable.outputs.enabled == 'true'
        run: pnpm run test:mutation

      - name: Upload mutation report
        if: always() && steps.check_enable.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ti-mutation-${{ github.run_id }}
          path: reports/mutation/**
          if-no-files-found: ignore
          retention-days: 14
