name: Publish npm package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish from main
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: corepack enable

      - name: Validate npm auth token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Missing NPM token. Set repository secret NPM_TOKEN (or NODE_AUTH_TOKEN)."
            exit 1
          fi

      - name: Configure npm auth token
        run: |
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NODE_AUTH_TOKEN" > "$NPMRC_PATH"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm run workspaces:build

      - name: Build distributable
        run: pnpm run build:package

      - name: Publish package
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          TAG="latest"

          get_latest_dist_tag() {
            npm dist-tag ls "$PACKAGE_NAME" 2>/tmp/npm-dist-tag.err | awk '/^latest:/ {print $2}'
          }

          if [[ "$VERSION" == *-* ]]; then
            TAG="pre-beta"
          fi

          if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$VERSION is already published. Skipping npm publish."
            CURRENT_CHANNEL="$(get_latest_dist_tag)"
            if [ "$CURRENT_CHANNEL" != "$VERSION" ]; then
              npm dist-tag add "$PACKAGE_NAME@$VERSION" latest
              echo "Aligned npm dist-tag 'latest' to existing version $VERSION."
            fi
            exit 0
          fi

          if [ ! -f dist/index.js ]; then
            echo "Build output dist/index.js is missing. Run pnpm run build:package before publish."
            exit 1
          fi

          if [ ! -f dist/cli.js ]; then
            echo "Build output dist/cli.js is missing. Run pnpm run build:package before publish."
            exit 1
          fi

          if [ ! -f dist/contracts/index.js ]; then
            echo "Build output dist/index.js is missing. Run pnpm run build:package before publish."
            exit 1
          fi

          if ! npm whoami >/tmp/npm-whoami.txt 2>/tmp/npm-whoami.err; then
            echo "npm authentication failed. Verify NODE_AUTH_TOKEN is configured for https://registry.npmjs.org."
            cat /tmp/npm-whoami.err
            exit 1
          fi

          echo "Publishing as $(cat /tmp/npm-whoami.txt)"
          npm publish --provenance --access public --tag "$TAG"

          # Keep npm `latest` aligned with the just-published package version
          # for operationally simple and predictable installs.
          # This intentionally moves the `latest` dist-tag even for pre-release
          # versions while preserving the dedicated `pre-beta` channel tag.
          CURRENT_CHANNEL="$(get_latest_dist_tag)"
          if [ "$CURRENT_CHANNEL" != "$VERSION" ]; then
            npm dist-tag add "$PACKAGE_NAME@$VERSION" latest
            echo "Moved npm dist-tag 'latest' to $VERSION."
          fi
