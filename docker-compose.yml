# Issue #30 — single-node Compose model for the standalone Test
# Intelligence container. Hardens default capabilities and binds the
# published port to host loopback only. Operators terminating TLS at a
# reverse proxy are expected to publish behind that proxy, not change
# the loopback bind here.

services:
  test-intelligence:
    build:
      context: .
    image: test-intelligence:local
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    ports:
      - "127.0.0.1:1983:1983"
    environment:
      TEST_INTELLIGENCE_HOST: 0.0.0.0
      TEST_INTELLIGENCE_PORT: "1983"
      TEST_INTELLIGENCE_LOG_FORMAT: json
    volumes:
      - test-intelligence-data:/workspace/.test-intelligence
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:1983/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  test-intelligence-data:
